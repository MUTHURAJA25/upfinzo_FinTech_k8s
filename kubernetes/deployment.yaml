apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintech-frontend
  namespace: fintech

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fintech-frontend

  template:
    metadata:
      labels:
        app: fintech-frontend

    spec:
      containers:
      - name: frontend

        image: muthuraja25/fintech-frontend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5173

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"