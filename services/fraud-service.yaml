apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-service
  template:
    metadata:
      labels:
        app: fraud-service
    spec:
      containers:
      - name: fraud-service
        image: muthuraja25/fraud-service:v1
        ports:
        - containerPort: 3008
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-service
spec:
  selector:
    app: fraud-service
  ports:
  - port: 3008
    targetPort: 3008