apiVersion: apps/v1
kind: Deployment
metadata:
  name: payout-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payout-service
  template:
    metadata:
      labels:
        app: payout-service
    spec:
      containers:
      - name: payout-service
        image: muthuraja25/user-service:v1
        ports:
        - containerPort: 3005
---
apiVersion: v1
kind: Service
metadata:
  name: payout-service
spec:
  selector:
    app: payout-service
  ports:
  - port: 3005
    targetPort: 3005