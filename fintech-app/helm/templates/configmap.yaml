apiVersion: v1
kind: ConfigMap
metadata:
  name: fintech-config
  namespace: fintech

data:
  NODE_ENV: "production"
  PORT: "3001"

  MONGO_HOST: "mongodb-service"
  MONGO_PORT: "27017"
  MONGO_DB: "fintech"

  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "fintech"

  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  KAFKA_BROKER: "kafka-service:9092"

  API_GATEWAY_URL: "http://api-gateway-service"

  NOTIFICATION_URL: "http://notification-service:3007"

  TRANSACTION_URL: "http://transaction-service:3006"